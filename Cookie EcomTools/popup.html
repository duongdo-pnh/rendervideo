<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopee Cookie Getter - Multi Country</title>
  <style>
    body {
      width: 450px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ee4d2d 0%, #d73211 100%);
      color: white;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
    
    .header h2 {
      margin: 0;
      font-size: 18px;
    }
    
    .header .subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 5px;
    }
    
    .country-info {
      background: rgba(255, 255, 255, 0.15);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .country-flag {
      font-size: 20px;
      margin-right: 8px;
    }
    
    .container {
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      backdrop-filter: blur(5px);
    }
    
    .container h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    textarea {
      width: 100%;
      height: 80px;
      margin-top: 5px;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      resize: vertical;
    }
    
    button {
      margin-top: 8px;
      padding: 8px 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }
    
    .status {
      font-size: 11px;
      margin-top: 5px;
      opacity: 0.8;
    }
    
    .error {
      color: #ffcccb;
    }
    
    .success {
      color: #90EE90;
    }
    
    .icon {
      width: 12px;
      height: 12px;
    }
    
    .last-updated {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🛒 Shopee Cookie</h2>
    <div class="subtitle">Multi-Country Support (VN, MY, PH, TW, TH, ID)</div>
  </div>

  <div class="country-info" id="countryInfo">
    <span id="countryFlag">🌏</span>
    <span id="countryName">Chọn trang Shopee để lấy cookie</span>
  </div>

  <div class="container">
    <h3>
      🍪 Cookie:
      <span class="status" id="cookieStatus"></span>
    </h3>
    <textarea id="cookieOutput" readonly placeholder="Cookie sẽ xuất hiện tại đây..."></textarea>
    <button id="copyCookie">📋 Copy Cookie</button>
    <div class="last-updated" id="cookieLastUpdated"></div>
  </div>

  <div class="container">
    <h3>
      🖥️ User Agent:
    </h3>
    <textarea id="uaOutput" readonly placeholder="User Agent sẽ xuất hiện tại đây..."></textarea>
    <button id="copyUA">📋 Copy User Agent</button>
  </div>

  <div class="container">
    <h3>
      📤 Gửi vào hệ thống:
      <span class="status" id="sendStatus"></span>
    </h3>
    <input id="endpoint" type="text"
           style="width:100%;padding:8px;border:none;border-radius:4px;font-size:12px;color:#333;"
           placeholder="http://127.0.0.1:7863/api/shopee/cookie">
    <label style="display:flex;align-items:center;gap:6px;font-size:11px;margin-top:8px;cursor:pointer;">
      <input id="autoSend" type="checkbox" checked> Tự động gửi khi có cookie
    </label>
    <button id="sendSystem" style="margin-top:8px;width:100%;">📤 Gửi cookie + UA vào hệ thống</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
