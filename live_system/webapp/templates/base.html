<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relive Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        ink: '#0d0f16', panel: '#161925', panel2: '#1e2230',
        line: '#2a2f40', brand: '#7c5cff', live: '#ff4d6d', ok: '#22c55e',
      }}}
    }
  </script>
  <link rel="stylesheet" href="/static/app.css?v={{ v }}">
</head>
<body class="bg-ink text-slate-200 text-sm">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-56 shrink-0 bg-panel border-r border-line flex flex-col">
    <div class="px-4 py-4 flex items-center gap-2 border-b border-line">
      <div class="w-8 h-8 rounded-lg bg-brand grid place-items-center text-white">▶</div>
      <span class="font-semibold text-white">Relive Studio</span>
    </div>
    <nav class="flex-1 overflow-y-auto py-3">
      <div class="px-4 text-[11px] uppercase tracking-wide text-slate-500 mb-1">Tổng quan</div>
      {% for key, label, icon, route, built in sidebar %}
        <a href="{{route}}"
           class="flex items-center gap-3 px-4 py-2 cursor-pointer border-l-2
           {{ 'bg-brand/15 text-white border-brand' if key==page else 'text-slate-400 hover:bg-panel2 border-transparent' }}">
          <span>{{icon}}</span><span class="flex-1">{{label}}</span>
          {% if not built %}<span class="text-[10px] text-slate-600">soon</span>{% endif %}
        </a>
      {% endfor %}
    </nav>
    <div class="px-4 py-3 border-t border-line text-xs text-slate-500">
      Hỗ trợ nhanh · 1900 1234
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header class="h-14 shrink-0 bg-panel border-b border-line flex items-center px-5 gap-4">
      <div class="text-slate-400">Phiên live: <span id="t-session" class="text-white font-medium">—</span></div>
      <span id="t-livebadge" class="hidden px-2 py-0.5 rounded text-xs bg-live text-white">LIVE</span>
      <div class="ml-auto flex items-center gap-4 text-xs">
        <span id="t-obs" class="px-2 py-1 rounded-full bg-panel2 border border-line">OBS: …</span>
        <span id="t-stream" class="px-2 py-1 rounded-full bg-panel2 border border-line">Stream: …</span>
        <span id="t-clock" class="text-slate-400">00:00:00</span>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script>
  // đồng hồ topbar (mọi trang)
  setInterval(() => { const c = document.getElementById('t-clock');
    if (c) c.textContent = new Date().toLocaleTimeString('vi-VN'); }, 1000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
